<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>reCAPTCHA v3 Pro Tester</title>

    <style>
      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background-color: #f1f5f9;
        color: #334155;
        padding: 20px;
      }
      .wrapper {
        max-width: 750px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        color: #0f172a;
        font-size: 1.8rem;
        margin-bottom: 25px;
      }

      .section {
        background: white;
        border-radius: 12px;
        padding: 25px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 25px;
        border: 1px solid #e2e8f0;
      }
      .section-header {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
      }
      .step-num {
        background: #2563eb;
        color: white;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        margin-right: 12px;
        font-size: 12px;
      }
      h2 {
        font-size: 1.1rem;
        margin: 0;
        color: #1e293b;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 13px;
        color: #64748b;
      }
      input,
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 14px;
        margin-bottom: 15px;
        transition: border 0.2s;
      }
      input:focus,
      textarea:focus {
        border-color: #2563eb;
        outline: none;
      }

      /* Token Box Styling - NO WRAP */
      .token-container {
        position: relative;
        background: #1e293b;
        color: #38bdf8;
        border-radius: 6px;
        padding: 15px;
        margin-top: 10px;
        display: none;
      }
      #token-text {
        display: block;
        white-space: nowrap;
        overflow-x: auto;
        font-family: "Courier New", monospace;
        font-size: 12px;
        padding-right: 80px; /* Space for the button */
      }
      #token-text::-webkit-scrollbar {
        height: 4px;
      }
      #token-text::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }

      /* Copy Button */
      .copy-btn {
        position: absolute;
        right: 10px;
        top: 10px;
        background: #334155;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 4px;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .copy-btn:hover {
        background: #475569;
      }
      .copy-btn.copied {
        background: #10b981;
      }

      .btn-generate {
        background: #2563eb;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        transition: opacity 0.2s;
      }
      .btn-verify {
        background: #059669;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
      }
      .btn-generate:hover,
      .btn-verify:hover {
        opacity: 0.9;
      }

      .result-panel {
        margin-top: 15px;
        padding: 15px;
        border-radius: 6px;
        display: none;
        font-family: monospace;
        font-size: 13px;
      }
      .success {
        background: #ecfdf5;
        color: #065f46;
        border: 1px solid #a7f3d0;
        white-space: pre-wrap;
      }
      .error {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <h1>reCAPTCHA v3 Tester</h1>

      <div class="section">
        <div class="section-header">
          <div class="step-num">1</div>
          <h2>Frontend: Generate Token</h2>
        </div>

        <form id="gen-form" onsubmit="return prepareGenerate(event);">
          <label>Site Key:</label>
          <input
            type="text"
            id="site-key"
            placeholder="Paste Site Key (starts with 6L...)"
            required
          />
          <button id="generate-btn" class="btn-generate" type="submit">
            Generate New Token
          </button>
        </form>
        <div
          id="gen-status"
          style="
            font-size: 13px;
            margin-top: 8px;
            margin-bottom: 8px;
            color: #334155;
          "
        ></div>

        <div id="token-container" class="token-container">
          <button class="copy-btn" id="copy-btn" onclick="copyToken()">
            Copy
          </button>
          <code id="token-text"></code>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="step-num">2</div>
          <h2>Backend: Verify Token</h2>
        </div>

        <label>Your Secret Key:</label>
        <input
          type="text"
          id="secret-key"
          placeholder="Paste Secret Key (starts with 6L...)"
        />

        <label>Verification Token:</label>
        <textarea
          id="manual-token"
          rows="3"
          placeholder="Token will auto-fill..."
        ></textarea>

        <button onclick="runVerification()" class="btn-verify">
          Verify with Google API
        </button>

        <div id="verify-area" class="result-panel">
          <pre id="verify-text" style="margin: 0"></pre>
        </div>
      </div>
    </div>

    <script>
      // 1. Generation Logic
      function onTokenReceived(token) {
        document.getElementById("token-container").style.display = "block";
        document.getElementById("token-text").innerText = token;

        const copyBtn = document.getElementById("copy-btn");
        copyBtn.innerText = "Copy";
        copyBtn.classList.remove("copied");

        document.getElementById("manual-token").value = token;
      }

      function loadRecaptchaScript(siteKey) {
        return new Promise((resolve, reject) => {
          const existing = document.getElementById("recaptcha-script");
          if (existing) {
            existing.remove();
          }
          if (window.grecaptcha) {
            try {
              delete window.grecaptcha;
            } catch {
              window.grecaptcha = undefined;
            }
          }
          const script = document.createElement("script");
          script.id = "recaptcha-script";
          script.src = `https://www.google.com/recaptcha/api.js?render=${encodeURIComponent(siteKey)}`;
          script.async = true;
          script.defer = true;
          script.onload = () => resolve();
          script.onerror = () =>
            reject(new Error("Failed to load reCAPTCHA script."));
          document.head.append(script);
        });
      }

      async function prepareGenerate(event) {
        event.preventDefault();
        const siteKey = document.getElementById("site-key").value.trim();
        const status = document.getElementById("gen-status");
        const generateBtn = document.getElementById("generate-btn");

        if (!siteKey) {
          status.style.color = "#b91c1c";
          status.innerText = "Enter a site key first.";
          return false;
        }

        generateBtn.disabled = true;
        generateBtn.innerText = "Generating token...";
        status.style.color = "#334155";
        status.innerText = "Loading reCAPTCHA...";

        try {
          await loadRecaptchaScript(siteKey);
          if (typeof grecaptcha.ready !== "function") {
            throw new Error(
              "grecaptcha.ready unavailable; invalid reCAPTCHA script.",
            );
          }
          status.innerText = "Requesting token...";
          const token = await new Promise((resolve, reject) => {
            grecaptcha.ready(() => {
              if (typeof grecaptcha.execute !== "function") {
                reject(
                  new Error(
                    "grecaptcha.execute unavailable; ensure you are using reCAPTCHA v3.",
                  ),
                );
                return;
              }
              grecaptcha
                .execute(siteKey, { action: "submit" })
                .then((token) => resolve(token))
                .catch((err) => reject(err));
            });
          });
          if (!token) {
            throw new Error(
              "No token returned. Check your site key and domain settings.",
            );
          }
          onTokenReceived(token);
          status.style.color = "#065f46";
          status.innerText = "Token generated successfully.";
        } catch (err) {
          status.style.color = "#b91c1c";
          status.innerText = `Token generation failed: ${err.message}`;
          console.error("Token generation error", err);
          alert(`Token generation failed: ${err.message}`);
        } finally {
          generateBtn.disabled = false;
          generateBtn.innerText = "Generate New Token";
        }

        return false;
      }

      // 2. Copy Utility
      function copyToken() {
        const token = document.getElementById("token-text").innerText;
        const btn = document.getElementById("copy-btn");

        navigator.clipboard.writeText(token).then(() => {
          btn.innerText = "Copied!";
          btn.classList.add("copied");
          setTimeout(() => {
            btn.innerText = "Copy";
            btn.classList.remove("copied");
          }, 2000);
        });
      }

      // 3. Verification Logic
      async function runVerification() {
        const secret = document.getElementById("secret-key").value;
        const token = document.getElementById("manual-token").value;
        const verifyArea = document.getElementById("verify-area");
        const verifyText = document.getElementById("verify-text");

        if (!secret || !token) {
          alert("Missing Secret Key or Token!");
          return;
        }

        verifyArea.style.display = "block";
        verifyArea.className = "result-panel";
        verifyText.innerText = "Connecting to Google...";

        const googleUrl = "https://www.google.com/recaptcha/api/siteverify";

        try {
          const response = await fetch(googleUrl, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: `secret=${secret}&response=${token}`,
          });

          const data = await response.json();
          verifyText.innerText = JSON.stringify(data, null, 2);
          verifyArea.className = data.success
            ? "result-panel success"
            : "result-panel error";
        } catch (err) {
          verifyArea.className = "result-panel error";
          verifyText.innerText = "Error: " + err.message;
        }
      }
    </script>
  </body>
</html>
